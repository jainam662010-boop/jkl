<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Chapter — Class 10Edu</title>
<link rel="stylesheet" href="css/style.css">
<style>
/* Chapter-specific styles */
.recommend-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.rec-card { background:var(--bg3); border:1px solid var(--bdr); border-radius:var(--r); padding:12px 14px; text-decoration:none; color:inherit; display:block; transition:all .15s; min-height:64px; }
.rec-card:hover, .rec-card:focus { border-color:var(--bdr2); background:rgba(var(--br),.07); }
.rec-title { font-size:.82rem; font-weight:700; color:var(--t1); margin-bottom:4px; line-height:1.3; }
.rec-sub   { font-size:.71rem; color:var(--t3); }
@media(max-width:480px) { .recommend-grid { grid-template-columns:1fr; } }

/* lesson rows need big tap area */
.lesson-row { cursor:pointer; }
.lesson-row:active { background:rgba(var(--br),.12); }

/* Video embed safe */
.vid-embed { position:relative; width:100%; padding-bottom:56.25%; background:#000; overflow:hidden; }
.vid-embed iframe { position:absolute; top:0; left:0; width:100%; height:100%; border:none; }

/* Sticky video on scroll for desktop */
@media(min-width:900px) {
  .vid-sticky { position:sticky; top:calc(var(--nav-h) + 8px); }
}

.active-teacher { border-color: var(--accent) !important; background: var(--accent-bg) !important; box-shadow: var(--shadow-accent) !important; transform: translateY(-4px) !important; }
.active-type { border-color: var(--accent) !important; background: var(--accent-bg) !important; box-shadow: var(--shadow-accent) !important; transform: scale(1.05) !important; }
</style>
</head>
<body>
<div id="nb"></div>
<div class="page-layout">
  <div id="sb"></div>
  <main class="main-area" id="mainArea">
    <div style="display:flex;align-items:center;justify-content:center;padding:80px 0">
      <div class="spinner"></div>
    </div>
  </main>
</div>
<div id="bn"></div>
<div class="page-watermark"></div>

<script src="js/app.js"></script>
<script src="js/security.js"></script>
<script src="js/theme_todo.js"></script>
<script src="js/toast.js"></script>
<script src="js/gamification.js"></script>
<script>
'use strict';

/* ═══════════ QUIZ ENGINE ═══════════ */
const Quiz = {
  qs: [], cur: 0, sel: null, answered: false, score: 0, sid: '', cid: '',

  start(qs, sid, cid) {
    if (!qs || qs.length === 0) { App.toast('No questions available', '⚠️'); return; }
    this.qs = qs; this.cur = 0; this.sel = null;
    this.answered = false; this.score = 0;
    this.sid = sid; this.cid = cid;
    this._render();
  },

  _render() {
    const el = document.getElementById('quizBody');
    if (!el) return;
    const q   = this.qs[this.cur];
    const pct = Math.round((this.cur / this.qs.length) * 100);
    const L   = ['A','B','C','D'];

    el.innerHTML =
      `<div class="qpbar"><div class="qpfill" id="qpf" style="width:${pct}%"></div></div>` +
      `<span class="q-label">Question ${this.cur + 1} of ${this.qs.length}` +
        (q.difficulty ? ` &nbsp;·&nbsp; ${q.difficulty}` : '') + `</span>` +
      `<div class="q-text">${VidyaSec.sanitize(q.q)}</div>` +
      `<div class="q-opts" id="qOpts">` +
        q.options.map((o, i) =>
          `<button class="q-opt" data-idx="${i}">` +
            `<div class="q-lbl">${L[i]}</div>` +
            VidyaSec.sanitize(o) +
          `</button>`
        ).join('') +
      `</div>` +
      `<div class="q-fb" id="qFb"></div>` +
      `<div class="q-acts">` +
        `<button class="btn btn-b" id="qSub">Submit Answer</button>` +
        `<button class="btn btn-gh" id="qNext" style="display:none">` +
          (this.cur < this.qs.length - 1 ? 'Next →' : 'See Results') +
        `</button>` +
      `</div>`;

    // Bind via event delegation — no inline onclick
    document.getElementById('qOpts').addEventListener('click', e => {
      const btn = e.target.closest('.q-opt');
      if (btn && !this.answered) this._pick(parseInt(btn.dataset.idx));
    });
    document.getElementById('qSub').addEventListener('click',  () => this._submit());
    document.getElementById('qNext').addEventListener('click', () => this._next());
  },

  _pick(i) {
    this.sel = i;
    document.querySelectorAll('.q-opt').forEach((b, j) => b.classList.toggle('sel', j === i));
  },

  _submit() {
    if (this.sel === null || this.answered) return;
    this.answered = true;
    const q = this.qs[this.cur];
    document.querySelectorAll('.q-opt').forEach((b, i) => {
      if (i === q.answer)  b.classList.add('ok');
      else if (i === this.sel) b.classList.add('ng');
    });
    const fb = document.getElementById('qFb');
    if (this.sel === q.answer) {
      this.score++;
      fb.className = 'q-fb ok show';
      fb.textContent = '✅ Correct!';
    } else {
      fb.className = 'q-fb ng show';
      fb.innerHTML = '❌ Incorrect. Correct: <strong>' +
        VidyaSec.sanitize(q.options[q.answer]) + '</strong>';
    }
    document.getElementById('qSub').style.display  = 'none';
    document.getElementById('qNext').style.display = 'inline-flex';
    const pf = document.getElementById('qpf');
    if (pf) pf.style.width = Math.round(((this.cur + 1) / this.qs.length) * 100) + '%';
  },

  _next() {
    if (this.cur >= this.qs.length - 1) { this._result(); return; }
    this.cur++; this.sel = null; this.answered = false;
    this._render();
  },

  _result() {
    const pct = Math.round(this.score / this.qs.length * 100);
    const [em, msg] = pct >= 80 ? ['⭐','Board Ready!']
                    : pct >= 60 ? ['👍','Good work!']
                    : pct >= 40 ? ['📚','Keep practising!']
                    : ['💪','Revise and retry!'];
    const el = document.getElementById('quizBody');
    if (!el) return;
    el.innerHTML =
      `<div class="quiz-result">` +
        `<span class="qr-em">${em}</span>` +
        `<div style="font-family:var(--fd);font-size:1.1rem;color:var(--bl);margin-bottom:8px">${msg}</div>` +
        `<div class="qr-score">${this.score}/${this.qs.length}</div>` +
        `<div class="qr-sub">${pct}% accuracy</div>` +
        `<div style="display:flex;gap:9px;justify-content:center;flex-wrap:wrap;margin-top:16px">` +
          `<button class="btn btn-gh" id="qRetry">↺ Retry</button>` +
          `<button class="btn btn-tl" id="qDone">✅ Mark Chapter Complete</button>` +
        `</div>` +
      `</div>`;
    document.getElementById('qRetry').addEventListener('click', () =>
      Quiz.start(Quiz.qs, Quiz.sid, Quiz.cid));
    document.getElementById('qDone').addEventListener('click', () =>
      ChPage.markDone());
    App.saveScore(this.sid, this.cid, this.score, this.qs.length);
  }
};

/* ═══════════ CHAPTER PAGE ═══════════ */
const ChPage = {
  sid: '', cid: '', subj: null, ch: null, li: 0,
  teacher: 'all',
  ctype: 'video',

  async init() {
    this.sid = App.getParam('subject') || '';
    this.cid = App.getParam('chapter') || '';

    if (!this.sid || !this.cid) { location.href = 'dashboard.html'; return; }

    let data;
    try { data = await App.loadData(); } catch(e) {
      document.getElementById('mainArea').innerHTML =
        '<div style="padding:40px;text-align:center;color:var(--t2)">⚠️ Could not load content. Please refresh.</div>';
      return;
    }

    this.subj = App.getSubject(this.sid);
    this.ch   = App.getChapter(this.sid, this.cid);

    if (!this.subj || !this.ch) { location.href = 'dashboard.html'; return; }
    if (!this.ch.lessons || this.ch.lessons.length === 0) {
      this.ch.lessons = [{ id:'l0', title: this.ch.title, videoId:'', duration:'—' }];
    }

    document.title = this.ch.title + ' — Vidya Mandir';
    App.initPage(this.sid);

    // Set lesson index from URL param
    const liParam = App.getParam('lesson');
    if (liParam) {
      const idx = this.ch.lessons.findIndex(l => l.id === liParam);
      if (idx >= 0) this.li = idx;
    }
    // Clamp to valid range
    this.li = Math.max(0, Math.min(this.li, this.ch.lessons.length - 1));

    // Teacher + content type from URL
    this.teacher = (App.getParam('teacher') ? decodeURIComponent(App.getParam('teacher')) : (localStorage.getItem(`vm_teacher_${this.sid}_${this.cid}`) || 'all'));
    this.ctype   = App.getParam('type') || localStorage.getItem(`vm_type_${this.sid}_${this.cid}`) || 'video';

    this._render();

    // Track progress
    const cur = this.ch.lessons[this.li];
    App.setLast(this.sid, this.cid, cur?.title || this.ch.title);
    if (cur?.id) App.markWatched(this.sid, this.cid, cur.id);
  },

  _render() {
    const { ch, subj, sid, cid } = this;
    // Back-compat: if lessons don't have type/teacher, treat as video + all
    const normLessons = (ch.lessons || []).map(l => ({
      ...l,
      type: (l.type || 'video'),
      teacher: (l.teacher || 'all')
    }));
    ch.lessons = normLessons;

    const teachersFromData = () => {
      const admData = App._parseLS('vm_admin_data', { teachers: [] });
      const admTeach  = (admData.teachers  || []).filter(t => !t.subject || t.subject === sid);
      const allTeach  = [...(ch.teachers   || []), ...admTeach];
      const key = t => `${(t.name||'').toLowerCase()}::${(t.channel||'').toLowerCase()}::${t.subject||''}`;
      const map = new Map();
      allTeach.forEach(t => { if (t?.name) map.set(key(t), t); });
      return [...map.values()];
    };

    const allTeach = teachersFromData();
    const lessonListFor = (teacher, type) => {
      // teacher='all' matches all
      return (ch.lessons || []).filter(l => {
        const lt = (l.type||'video');
        const lteach = (l.teacher||'all');
        const teacherOk = teacher === 'all' || lteach === 'all' || lteach === teacher;
        const typeOk = type ? lt === type : true;
        return teacherOk && typeOk;
      });
    };

    // If current selection yields no lessons, relax teacher first then type.
    let filtered = lessonListFor(this.teacher, this.ctype);
    if (!filtered.length) filtered = lessonListFor('all', this.ctype);
    if (!filtered.length) filtered = lessonListFor('all', 'video');

    // Maintain li within filtered list; pick first if out of range
    this.li = Math.max(0, Math.min(this.li, filtered.length - 1));
    const lesson = filtered[this.li] || ch.lessons[0];
    const p         = App.getProgress();
    const isDone    = (p[sid]?.done || []).includes(cid);
    const bm        = App.isBookmarked(sid, cid);
    const admData   = App._parseLS('vm_admin_data', { pdfs:[], ncertTopics:[], teachers:[], animations:[], images:[], activities:[] });
    const pdfs      = (admData.pdfs    || []).filter(f => f.chapter === cid || f.subject === sid);
    const admTopics = (admData.ncertTopics || []).filter(t => t.chapter === cid || t.subject === sid);
    const allTopics = [...(ch.ncertTopics || []), ...admTopics];
    const recommended = subj.chapters.filter(c => c.id !== cid).slice(0, 4);

    // Subject enhancers (base + admin)
    const admAnim = (admData.animations||[]).filter(a => a.subject === sid && (a.chapter === cid || !a.chapter));
    const allAnim = [...(ch.animations||[]), ...admAnim];
    const admImgs = (admData.images||[]).filter(i => i.subject === sid && (i.chapter === cid || !i.chapter));
    const allImgs = [...(ch.images||[]), ...admImgs];
    const admAct  = (admData.activities||[]).filter(a => a.subject === sid && (a.chapter === cid || !a.chapter));
    const allAct  = [...(ch.activities||[]), ...admAct];

    // Build video src safely
    const vidSrc = lesson.videoId
      ? `https://www.youtube-nocookie.com/embed/${lesson.videoId}?rel=0&modestbranding=1`
      : '';

    const main = document.getElementById('mainArea');
    main.innerHTML = '';           // clear loading spinner

    // ── PAGE HEADER ──
    const header = document.createElement('div');
    header.className = 'page-head au';
    header.innerHTML =
      `<div class="breadcrumb">` +
        `<a href="dashboard.html">Dashboard</a><span class="sep">›</span>` +
        `<a href="subject.html?id=${sid}">${VidyaSec.sanitize(subj.name)}</a>` +
        `<span class="sep">›</span><span>${VidyaSec.sanitize(ch.title)}</span>` +
      `</div>` +
      `<div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:10px">` +
        `<div>` +
          `<h1>${VidyaSec.sanitize(ch.title)}</h1>` +
          `<div class="lead" style="display:flex;gap:10px;flex-wrap:wrap;margin-top:5px;font-size:.77rem">` +
            `<span>▶ ${filtered.length} item${filtered.length !== 1 ? 's' : ''}</span>` +
            `<span>⏱ ${ch.duration}</span>` +
            `<span>❓ ${ch.quiz.length} Qs</span>` +
            `<span>⭐ ${allTopics.length} topics</span>` +
            (pdfs.length ? `<span style="color:var(--tll)">PDFs ${pdfs.length}</span>` : '') +
            (isDone ? `<span style="color:var(--tll)">✅ Complete</span>` : '') +
          `</div>` +
        `</div>` +
        (isDone ? `<span class="chip chip-tl" style="font-size:.8rem;padding:5px 12px">✅ Done</span>` : '') +
      `</div>`;
    main.appendChild(header);

    // ── TEACHER + CONTENT PICKERS ──
    const picker = document.createElement('div');
    picker.className = 'au-1';
    picker.style.marginBottom = '32px';
    
    const teacherOptions = allTeach.map(t=>({id:`${t.name||''}::${t.channel||''}`, name:t.name, channel:t.channel, avatar:t.avatar, color:t.color}));
    const typeOptions = [
      {id:'video',      label:'Lessons', icon:'📺'},
      {id:'notes',      label:'Notes',         icon:'📝'},
      {id:'explanation',label:'Brainstorm',   icon:'💡'},
      {id:'pdf',        label:'Resources',           icon:'�'},
      {id:'quiz',       label:'Quiz',          icon:'🧩'},
    ];

    picker.innerHTML = `
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:24px">
        <h3 style="font-size:0.9rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--ink-4)">Quick Selection</h3>
        <button class="btn btn-primary btn-sm" onclick="location.href='lesson-selection.html?subject=${sid}&chapter=${cid}'">
          🚀 Advanced Selection
        </button>
      </div>
      <div style="margin-bottom:24px">
        <h4 style="margin-bottom:16px; font-size:0.8rem; color:var(--ink-4)">Select Instructor</h4>
        <div style="display:flex; gap:12px; overflow-x:auto; padding-bottom:8px" id="teacherCards">
          <div class="premium-card ${this.teacher==='all'?'active-teacher':''}" data-id="all" style="padding:12px 20px; display:flex; align-items:center; gap:12px; cursor:pointer; min-width:160px; flex-shrink:0">
            <div style="width:32px; height:32px; border-radius:8px; background:var(--accent-bg); display:flex; align-items:center; justify-content:center; font-size:16px">�</div>
            <div style="font-size:0.85rem; font-weight:800">All Teachers</div>
          </div>
          ${teacherOptions.map(t => `
            <div class="premium-card ${this.teacher===t.id?'active-teacher':''}" data-id="${encodeURIComponent(t.id)}" style="padding:12px 20px; display:flex; align-items:center; gap:12px; cursor:pointer; min-width:180px; flex-shrink:0">
              <div style="width:32px; height:32px; border-radius:8px; background:${t.color||'var(--accent)'}; color:#fff; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:900">${VidyaSec.sanitize(t.avatar||t.name[0])}</div>
              <div>
                <div style="font-size:0.85rem; font-weight:800">${VidyaSec.sanitize(t.name)}</div>
                <div style="font-size:0.65rem; font-weight:600; opacity:0.6">${VidyaSec.sanitize(t.channel)}</div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
      <div>
        <h4 style="margin-bottom:16px; font-size:0.8rem; color:var(--ink-4)">Learning Format</h4>
        <div style="display:flex; gap:12px; overflow-x:auto; padding-bottom:8px">
          ${typeOptions.map(t => `
            <div class="premium-card ${this.ctype===t.id?'active-type':''}" data-type="${t.id}" style="padding:16px 24px; display:flex; flex-direction:column; align-items:center; gap:8px; cursor:pointer; min-width:120px; text-align:center">
              <div style="font-size:24px">${t.icon}</div>
              <div style="font-size:0.85rem; font-weight:800">${t.label}</div>
            </div>
          `).join('')}
        </div>
      </div>`;
    main.appendChild(picker);

    // Bind picker events
    picker.querySelectorAll('[data-id]').forEach(el => el.addEventListener('click', () => {
      this.teacher = el.dataset.id === 'all' ? 'all' : decodeURIComponent(el.dataset.id);
      this.li = 0;
      localStorage.setItem(`vm_teacher_${sid}_${cid}`, this.teacher);
      this._render();
    }));
    picker.querySelectorAll('[data-type]').forEach(el => el.addEventListener('click', () => {
      this.ctype = el.dataset.type;
      this.li = 0;
      localStorage.setItem(`vm_type_${sid}_${cid}`, this.ctype);
      this._render();
    }));

    // ── GRID WRAPPER ──
    const grid = document.createElement('div');
    grid.className = 'ch-grid';
    main.appendChild(grid);

    // LEFT COLUMN
    const left = document.createElement('div');
    grid.appendChild(left);

    // Content router: Notes / PDF / Quiz use existing sections
    const isNotes = this.ctype === 'notes';
    const isPDF   = this.ctype === 'pdf';
    const isQuiz  = this.ctype === 'quiz';

    // -- VIDEO --
    const vidWrap = document.createElement('div');
    vidWrap.className = 'vid-wrap vid-sticky au';
    if (!isNotes && !isPDF && !isQuiz && vidSrc) {
      vidWrap.innerHTML =
        `<div class="card-top-rule"></div>` +
        `<div class="vid-embed">` +
          `<iframe id="vFrame" src="${vidSrc}" title="${VidyaSec.sanitize(lesson.title)}"` +
          ` allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture"` +
          ` allowfullscreen loading="lazy"></iframe>` +
        `</div>` +
        `<div class="vid-meta">` +
          `<h3 id="vTitle">${VidyaSec.sanitize(lesson.title)}</h3>` +
          `<div style="display:flex;gap:10px;font-size:.73rem;color:var(--t3);align-items:center;flex-wrap:wrap">` +
            `<span>⏱ <span id="vDur">${lesson.duration}</span></span>` +
            `<span>${subj.icon} ${VidyaSec.sanitize(subj.name)}</span>` +
            `<button class="vid-bookmark${bm ? ' saved' : ''}" id="bmBtn" style="margin-left:auto">` +
              `${bm ? '🔖' : '🔗'}` +
            `</button>` +
          `</div>` +
        `</div>`;
    } else if (!isNotes && !isPDF && !isQuiz) {
      vidWrap.innerHTML =
        `<div class="card-top-rule"></div>` +
        `<div style="padding:32px;text-align:center;color:var(--t3)">` +
          `<div style="font-size:40px;margin-bottom:8px">📺</div>` +
          `<div>Video not yet assigned.<br>Admin can add a YouTube link.</div>` +
        `</div>` +
        `<div class="vid-meta"><h3 id="vTitle">${VidyaSec.sanitize(lesson.title)}</h3></div>`;
    }
    left.appendChild(vidWrap);

    // Bookmark button event
    document.getElementById('bmBtn')?.addEventListener('click', () => this._toggleBm());

    // -- LESSONS LIST --
    const showLessonList = !isNotes && !isPDF && !isQuiz && filtered.length >= 1;
    this._filteredLessons = filtered; // Store for _switchLesson
    if (showLessonList) {
      const llCard = document.createElement('div');
      llCard.className = 'lesson-card au-1';
      let llHtml =
        `<div class="card-top-rule"></div>` +
        `<div class="sec-head"><h3>📋 ${this.ctype === 'one-shot' ? 'One-shots' : this.ctype === 'explanation' ? 'Explanations' : 'Lessons'}</h3>` +
        `<span style="font-size:.73rem;color:var(--t3)">${filtered.length} total</span></div>`;
      filtered.forEach((l, i) => {
        llHtml +=
          `<div class="lesson-row${i === this.li ? ' active' : ''}" data-li="${i}">` +
            `<div class="lesson-n" id="ln${i}">${i === this.li ? '▶' : i + 1}</div>` +
            `<div style="flex:1"><div class="lesson-title">${VidyaSec.sanitize(l.title)}</div></div>` +
            `<div class="lesson-dur">${l.duration}</div>` +
          `</div>`;
      });
      llCard.innerHTML = llHtml;
      // Event delegation — one listener, not N inline handlers
      llCard.addEventListener('click', e => {
        const row = e.target.closest('.lesson-row');
        if (!row) return;
        const idx = parseInt(row.dataset.li, 10);
        if (!Number.isFinite(idx)) return;
        this._switchLesson(idx);
      });
      left.appendChild(llCard);
    }

    // -- ADMIN NOTE --
    if (ch._adminNote) {
      const noteDiv = document.createElement('div');
      noteDiv.className = 'gcard au-2';
      noteDiv.style.marginBottom = '14px';
      noteDiv.innerHTML =
        `<div class="card-top-rule"></div>` +
        `<div class="card-pad">` +
          `<div style="font-family:var(--fd);font-size:.88rem;color:var(--bl);font-weight:700;margin-bottom:6px">📌 Teacher's Note</div>` +
          `<p style="font-size:.84rem;color:var(--t2);line-height:1.7;white-space:pre-line">${VidyaSec.sanitize(ch._adminNote)}</p>` +
        `</div>`;
      left.appendChild(noteDiv);
    }

    // -- NCERT TOPICS --
    if (allTopics.length) {
      const tc = document.createElement('div');
      tc.className = 'topics-card au-2';
      let tHtml =
        `<div class="card-top-rule"></div>` +
        `<div class="sec-head"><h3>⭐ NCERT Important Topics</h3><span class="chip chip-nc">Board Focus</span></div>`;
      allTopics.forEach((t, i) => {
        tHtml +=
          `<div class="topic-row">` +
            `<div class="topic-n">${i + 1}</div>` +
            `<div class="topic-text">${VidyaSec.sanitize(t.text)}` +
              (t.important ? ' <span style="color:var(--b)">★</span>' : '') +
              (t.type ? ` <span class="chip chip-tl" style="font-size:.62rem;padding:1px 6px">${VidyaSec.sanitize(t.type)}</span>` : '') +
            `</div>` +
            (t.marks ? `<div class="topic-marks">${VidyaSec.sanitize(t.marks)}M</div>` : '') +
          `</div>`;
      });
      tc.innerHTML = tHtml;
      left.appendChild(tc);
    }

    // -- PDFs --
    if (isPDF && pdfs.length) {
      const pdfCard = document.createElement('div');
      pdfCard.className = 'pdf-card au-3';
      let pHtml =
        `<div class="card-top-rule"></div>` +
        `<div class="sec-head"><h3>📁 PDF Resources</h3>` +
        `<span class="chip chip-tl">${pdfs.length} file${pdfs.length !== 1 ? 's' : ''}</span></div>` +
        `<div class="card-pad">`;
      pdfs.forEach(pdf => {
        pHtml +=
          `<div class="pdf-row" data-url="${pdf.url}">` +
            `<span style="font-size:20px">📄</span>` +
            `<span style="flex:1;font-size:.84rem;font-weight:600">${VidyaSec.sanitize(pdf.name)}</span>` +
            `<span class="chip chip-${pdf.type === 'Notes' ? 'b' : pdf.type === 'Questions' ? 'a' : 'tl'}">` +
              VidyaSec.sanitize(pdf.type || 'Notes') +
            `</span>` +
            `<a href="${pdf.url}" download="${VidyaSec.sanitize(pdf.name)}" class="btn btn-gh btn-sm" rel="noopener">⬇</a>` +
          `</div>`;
      });
      pHtml += `<div id="pdfViewerWrap" style="display:none;margin-top:10px;border-radius:10px;overflow:hidden">` +
        `<iframe id="pdfFrame" src="" style="width:100%;height:480px;border:none;background:#fff"></iframe>` +
      `</div></div>`;
      pdfCard.innerHTML = pHtml;
      // Delegation for pdf rows
      pdfCard.addEventListener('click', e => {
        const row = e.target.closest('.pdf-row');
        if (row && !e.target.closest('a')) this._viewPDF(row.dataset.url);
      });
      left.appendChild(pdfCard);
    }

    // -- NOTES --
    if (isNotes) {
      const notesCard = document.createElement('div');
      notesCard.className = 'notes-card au-3';
      notesCard.innerHTML =
        `<div class="card-top-rule"></div>` +
        `<div class="sec-head">` +
          `<h3>📝 Chapter Notes</h3>` +
          `<div style="display:flex;gap:6px">` +
            `<span class="chip chip-b">NCERT</span>` +
            `<button class="btn btn-gh btn-sm" id="printBtn">🖨 Print</button>` +
          `</div>` +
        `</div>` +
        `<div class="notes-body" id="notesBody">${this._renderNotes(ch.notes)}</div>`;
      left.appendChild(notesCard);
      document.getElementById('printBtn')?.addEventListener('click', () => this._print());
    }

    // -- QUIZ --
    if (isQuiz) {
      const allQ = this._getAllQuiz();
      const quizCard = document.createElement('div');
      quizCard.className = 'quiz-card au-4';
      quizCard.innerHTML =
        `<div class="card-top-rule"></div>` +
        `<div class="sec-head"><h3>🧠 Chapter Quiz</h3>` +
          `<span class="chip chip-a">${allQ.length} Questions</span>` +
        `</div>` +
        `<div id="quizBody" class="quiz-body">` +
          `<div style="text-align:center;padding:16px">` +
            `<p style="color:var(--t2);margin-bottom:14px;font-size:.88rem">` +
              `Test your understanding of <strong>${VidyaSec.sanitize(ch.title)}</strong>` +
            `</p>` +
            `<button class="btn btn-b btn-lg" id="startQuizBtn">🚀 Start Quiz</button>` +
          `</div>` +
        `</div>`;
      left.appendChild(quizCard);
      quizCard.querySelector('#startQuizBtn')?.addEventListener('click', () =>
        Quiz.start(this._getAllQuiz(), sid, cid));
    }

    // -- RECOMMENDED --
    if (recommended.length) {
      const recDiv = document.createElement('div');
      recDiv.className = 'au-4';
      recDiv.style.marginTop = '4px';
      let rHtml =
        `<div style="font-family:var(--fd);font-size:.95rem;color:var(--bl);margin-bottom:10px">` +
          `📚 More in ${VidyaSec.sanitize(subj.name)}` +
        `</div>` +
        `<div class="recommend-grid">`;
      recommended.forEach(r => {
        const rd = (p[sid]?.done || []).includes(r.id);
        rHtml +=
          `<a href="chapter.html?subject=${sid}&chapter=${r.id}" class="rec-card">` +
            `<div class="rec-title">${VidyaSec.sanitize(r.title)}</div>` +
            `<div class="rec-sub">⏱ ${r.duration} · ❓ ${r.quiz.length} Qs${rd ? ' · ✅' : ''}</div>` +
          `</a>`;
      });
      rHtml += `</div>`;
      recDiv.innerHTML = rHtml;
      left.appendChild(recDiv);
    }

    // -- ACTION BUTTONS --
    const actions = document.createElement('div');
    actions.style.cssText = 'display:flex;gap:9px;flex-wrap:wrap;margin-top:18px';
    actions.innerHTML =
      `<button class="btn btn-b" id="doneBtn">✅ Mark Complete</button>` +
      `<a href="subject.html?id=${sid}" class="btn btn-gh">← ${VidyaSec.sanitize(subj.name)}</a>` +
      `<button class="btn btn-tl" id="todoBtn">📋 Add to Tasks</button>`;
    left.appendChild(actions);
    actions.querySelector('#doneBtn')?.addEventListener('click', () => this.markDone());
    actions.querySelector('#todoBtn')?.addEventListener('click', () => this._addTodo());

    // ── SAFE AD SLOT (bottom only) ──
    const adWrap = document.createElement('div');
    adWrap.className = 'ad-slot au-4';
    adWrap.innerHTML = App.adBanner() || '';
    if (adWrap.innerHTML.trim()) left.appendChild(adWrap);

    // RIGHT COLUMN (sidebar)
    const right = document.createElement('div');
    grid.appendChild(right);

    // Teachers
    if (allTeach.length) {
      const tc = document.createElement('div');
      tc.className = 'side-card';
      let tHtml =
        `<div class="card-top-rule"></div>` +
        `<div class="sec-head"><h3>👨‍🏫 Educators</h3></div>` +
        `<div style="padding:10px;display:flex;flex-direction:column;gap:7px">`;
      allTeach.forEach(t => {
        tHtml +=
          `<div class="teacher-row">` +
            `<div class="teacher-av" style="background:${t.color || 'var(--b)'};color:#fff">` +
              VidyaSec.sanitize((t.avatar || t.name?.[0] || 'T').slice(0,2)) +
            `</div>` +
            `<div>` +
              `<div style="font-size:.83rem;font-weight:700">${VidyaSec.sanitize(t.name)}</div>` +
              `<div style="font-size:.7rem;color:var(--t3)">📺 ${VidyaSec.sanitize(t.channel)}</div>` +
            `</div>` +
          `</div>`;
      });
      tHtml += `</div>`;
      tc.innerHTML = tHtml;
      right.appendChild(tc);
    }

    // Chapter nav
    const navCard = document.createElement('div');
    navCard.className = 'side-card';
    let navHtml =
      `<div class="card-top-rule"></div>` +
      `<div class="sec-head"><h3>📑 ${VidyaSec.sanitize(subj.name)}</h3></div>` +
      `<div style="padding:7px">`;
    subj.chapters.forEach((c, i) => {
      const d2 = (p[sid]?.done || []).includes(c.id);
      navHtml +=
        `<a href="chapter.html?subject=${sid}&chapter=${c.id}"` +
          ` class="ch-nav-link${c.id === cid ? ' active' : ''}${d2 ? ' done-ch' : ''}">` +
          `<div class="ch-nav-n">${d2 ? '✓' : i + 1}</div>` +
          `<span>${VidyaSec.sanitize(c.title)}</span>` +
        `</a>`;
    });
    navHtml += `</div>`;
    navCard.innerHTML = navHtml;
    right.appendChild(navCard);

    // Quick task widget
    const taskCard = document.createElement('div');
    taskCard.className = 'side-card';
    taskCard.innerHTML =
      `<div class="card-top-rule"></div>` +
      `<div class="quick-widget">` +
        `<div class="qw-title">📋 Quick Task</div>` +
        `<input class="todo-inp" id="qTask" placeholder="Revision note…" style="margin-bottom:7px;width:100%">` +
        `<select class="fc" id="qPri" style="margin-bottom:8px;font-size:.8rem">` +
          `<option value="normal">Normal</option>` +
          `<option value="high">🔴 High Priority</option>` +
        `</select>` +
        `<button class="btn btn-b btn-sm" id="qAddBtn" style="width:100%;justify-content:center">+ Add Task</button>` +
      `</div>`;
    // Bind events after insert
    right.appendChild(taskCard);
    taskCard.querySelector('#qAddBtn')?.addEventListener('click', () => this._addQuick());
    taskCard.querySelector('#qTask')?.addEventListener('keydown', e => {
      if (e.key === 'Enter') this._addQuick();
    });

    // ── SUBJECT-SPECIFIC ENHANCERS (non-disruptive, below core learning) ──
    // Science: Animations section
    if (sid === 'science' && allAnim.length) {
      const ac = document.createElement('div');
      ac.className = 'au-3';
      ac.style.marginTop = '32px';
      ac.innerHTML = `
        <h2 style="margin-bottom:24px">🧪 Cinematic Science Simulations</h2>
        <div class="media-grid">
          ${allAnim.map(v=>{
            const thumb = v.videoId ? `https://i.ytimg.com/vi/${v.videoId}/maxresdefault.jpg` : '';
            return `<div class="premium-card" style="padding:0; cursor:pointer" onclick="window.open('https://www.youtube.com/watch?v=${v.videoId}','_blank')">
              <div style="position:relative">
                <img src="${thumb}" style="width:100%; aspect-ratio:16/9; object-fit:cover; display:block">
                <div style="position:absolute; inset:0; background:linear-gradient(0deg, rgba(0,0,0,0.8) 0%, transparent 60%); display:flex; align-items:flex-end; padding:16px">
                  <div style="color:#fff">
                    <div style="font-size:0.9rem; font-weight:800; margin-bottom:4px">${VidyaSec.sanitize(v.title||'Animation')}</div>
                    <div style="font-size:0.7rem; font-weight:600; opacity:0.8">Visual Simulation • ${v.duration||'Video'}</div>
                  </div>
                </div>
                <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:48px; height:48px; border-radius:50%; background:rgba(255,255,255,0.2); backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center; font-size:20px; color:#fff">▶</div>
              </div>
            </div>`;
          }).join('')}
        </div>`;
      left.appendChild(ac);
    }

    // SST: Timeline Enhancement
    if (sid === 'social-science') {
      const tc = document.createElement('div');
      tc.className = 'au-3';
      tc.style.marginTop = '32px';
      tc.innerHTML = `
        <h2 style="margin-bottom:24px">⏳ Historical Timeline</h2>
        <div class="premium-card" style="padding:32px">
          <div style="display:flex; flex-direction:column; gap:32px; position:relative">
            <div style="position:absolute; left:11px; top:0; bottom:0; width:2px; background:var(--bg-3)"></div>
            ${allTopics.filter(t => t.year || t.date).sort((a,b) => (a.year||0) - (b.year||0)).map(t => `
              <div style="display:flex; gap:24px; position:relative">
                <div style="width:24px; height:24px; border-radius:50%; background:var(--accent); border:4px solid var(--surface); z-index:1; flex-shrink:0"></div>
                <div>
                  <div style="font-size:0.8rem; font-weight:900; color:var(--accent); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:4px">${t.year || t.date}</div>
                  <div style="font-size:1.1rem; font-weight:800; color:var(--ink); margin-bottom:8px">${VidyaSec.sanitize(t.text)}</div>
                  ${t.marks ? `<span class="chip chip-tl">Important: ${t.marks} Marks</span>` : ''}
                </div>
              </div>
            `).join('')}
            ${!allTopics.some(t=>t.year||t.date) ? '<div style="text-align:center; color:var(--ink-4)">No timeline events for this chapter.</div>' : ''}
          </div>
        </div>`;
      left.appendChild(tc);
    }

    // Chemistry: NCERT Activities (in Science chemistry chapters)
    const chemCh = new Set(['chemical-reactions','acids-bases','metals-nonmetals','carbon-compounds']);
    if (sid === 'science' && chemCh.has(cid) && allAct.length) {
      const kc = document.createElement('div');
      kc.className = 'pdf-card au-3';
      kc.innerHTML = `
        <div class="card-top-rule"></div>
        <div class="sec-head"><h3>🧫 NCERT Activities (Chemistry)</h3><span class="chip chip-a">Do & learn</span></div>
        <div class="card-pad">
          ${allAct.map((a,ai)=>`
            <div class="gcard" style="margin-bottom:12px">
              <div class="card-top-rule"></div>
              <div class="card-pad">
                <div style="font-weight:900;color:var(--ink);margin-bottom:8px">Activity ${ai+1}: ${VidyaSec.sanitize(a.title||'')}</div>
                <div class="steps">
                  ${(a.steps||[]).map((s,i)=>`<div class="step"><div class="step-n">${i+1}</div><div class="step-t">${VidyaSec.sanitize(s)}</div></div>`).join('')}
                  ${a.outcome?`<div class="outcome"><strong style="color:var(--accent)">Expected:</strong> ${VidyaSec.sanitize(a.outcome)}</div>`:''}
                </div>
              </div>
            </div>
          `).join('')}
        </div>`;
      left.appendChild(kc);
    }
  },

  // ── Lesson switch ──
  _switchLesson(idx) {
    // Use stored filtered list
    const filtered = this._filteredLessons || [];
    if (idx < 0 || idx >= filtered.length) {
      App.toast('Lesson not found', '❌');
      return;
    }
    this.li = idx;
    const l = filtered[idx];
    if (!l) {
      App.toast('Lesson data missing', '❌');
      return;
    }

    // Update iframe
    const frame = document.getElementById('vFrame');
    if (frame) {
      const newSrc = l.videoId
        ? `https://www.youtube-nocookie.com/embed/${l.videoId}?rel=0&modestbranding=1&autoplay=1`
        : '';
      if (frame.src !== newSrc) frame.src = newSrc;
    }

    // Update meta text
    const vt = document.getElementById('vTitle');
    if (vt) vt.textContent = l.title || '';
    const vd = document.getElementById('vDur');
    if (vd) vd.textContent = l.duration || '';

    // Update lesson row highlight
    document.querySelectorAll('.lesson-row').forEach((row, i) => {
      row.classList.toggle('active', i === idx);
      const n = document.getElementById('ln' + i);
      if (n) n.textContent = i === idx ? '▶' : i + 1;
    });

    App.setLast(this.sid, this.cid, l.title);
    if (l.id) App.markWatched(this.sid, this.cid, l.id);
  },

  // ── Bookmark ──
  _toggleBm() {
    const saved = App.toggleBookmark(this.sid, this.cid);
    const btn   = document.getElementById('bmBtn');
    if (btn) { btn.textContent = saved ? '🔖' : '🔗'; btn.classList.toggle('saved', saved); }
    App.toast(saved ? 'Bookmarked! 🔖' : 'Bookmark removed');
  },

  // ── PDF viewer ──
  _viewPDF(url) {
    const frame = document.getElementById('pdfFrame');
    const wrap  = document.getElementById('pdfViewerWrap');
    if (frame) frame.src = url;
    if (wrap)  { wrap.style.display = 'block'; wrap.scrollIntoView({ behavior:'smooth', block:'start' }); }
  },

  // ── Notes renderer ──
  _renderNotes(n) {
    if (!n?.content || n.content.length === 0)
      return '<p style="color:var(--t3)">No notes available for this chapter.</p>';
    return n.content.map(item => {
      const t = VidyaSec.sanitize(item.text || '');
      switch (item.type) {
        case 'intro':    return `<div class="n-intro">${t}</div>`;
        case 'heading':  return `<div class="n-head">${t}</div>`;
        case 'text':     return `<p class="n-text">${t}</p>`;
        case 'keypoint': return `<div class="n-kp">${t}</div>`;
        case 'formula':  return `<div class="n-formula">📐 ${t}</div>`;
        case 'example':
          return `<div class="n-example">` +
            `<div class="n-q">💡 ${VidyaSec.sanitize(item.question || '')}</div>` +
            `<div class="n-a">→ ${VidyaSec.sanitize(item.answer || '')}</div>` +
          `</div>`;
        default: return `<p class="n-text">${t}</p>`;
      }
    }).join('');
  },

  // ── Get all quiz (built-in + admin) ──
  _getAllQuiz() {
    const admData = App._parseLS('vm_admin_data', { quiz: [] });
    const extra   = (admData.quiz || []).filter(q =>
      q.chapter === this.cid || q.subject === this.sid);
    return [...(this.ch.quiz || []), ...extra];
  },

  // ── Mark done ──
  markDone() {
    App.markDone(this.sid, this.cid);
    App.toast('🎉 Chapter marked complete!');
    
    // Gamification: Add XP for chapter completion
    if (window.Gamification) {
      Gamification.addXP('CHAPTER_COMPLETE');
      Gamification.updateGoal('explore', 1);
      Gamification.recordStudyDay();
      
      // Check for subject mastery badges
      const completedChapters = JSON.parse(localStorage.getItem('vm_done') || '{}');
      const subjectChapters = this.subj.chapters || [];
      const completedInSubject = subjectChapters.filter(ch => completedChapters[this.sid]?.includes(ch.id)).length;
      
      if (completedInSubject >= subjectChapters.length) {
        const badgeId = this.sid === 'mathematics' ? 'math_whiz' : 
                       this.sid === 'science' ? 'science_guru' : 
                       this.sid === 'social-science' ? 'sst_master' : null;
        if (badgeId) Gamification.unlockBadge(badgeId);
      }
    }
    
    // Update done badge in header
    const badges = document.querySelectorAll('.lead span');
    badges.forEach(b => { if (b.textContent.includes('Complete')) b.style.color = 'var(--tll)'; });
  },

  // ── Add to tasks ──
  _addTodo() {
    TodoPanel.add('Revise: ' + this.ch.title, this.sid, '', 'normal', '');
    App.toast('Added to tasks 📋');
  },

  // ── Quick task ──
  _addQuick() {
    const inp  = document.getElementById('qTask');
    const pri  = document.getElementById('qPri')?.value || 'normal';
    const text = VidyaSec.clampStr((inp?.value || '').trim(), 200);
    if (!text) return;
    TodoPanel.add(text, this.sid, '', pri, '');
    if (inp) inp.value = '';
    App.toast('Task added ✅');
  },

  // ── Print notes (no scripts in print window) ──
  _print() {
    const body = document.getElementById('notesBody')?.innerText || '';
    const w = window.open('', '_blank');
    if (!w) { App.toast('Allow pop-ups to print', '⚠️'); return; }
    w.document.write(
      '<!DOCTYPE html><html><head>' +
      '<title>' + this.ch.title + ' — Notes</title>' +
      '<style>' +
        'body{font-family:Georgia,serif;max-width:680px;margin:40px auto;' +
        'line-height:1.9;color:#1a0e06;padding:0 20px}' +
        'h1{color:#8A5010}pre{white-space:pre-wrap;font-family:inherit}' +
        '@media print{body{margin:20px}}' +
      '</style>' +
      '</head><body>' +
      '<h1>📝 ' + this.ch.title + '</h1>' +
      '<h3 style="color:#666;margin-bottom:20px">' + this.subj.name + ' · Vidya Mandir</h3>' +
      '<hr><pre>' + body.replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</pre>' +
      '</body></html>'
    );
    w.document.close();
    setTimeout(() => { try { w.print(); } catch(e) {} }, 400);
  }
};

document.addEventListener('DOMContentLoaded', () => ChPage.init());
</script>
</body>
</html>
