<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Teacher Admin — Class 10Edu</title>
<link rel="stylesheet" href="css/style.css">
<style>
/* Admin Layout */
.admin-grid { display: grid; grid-template-columns: 260px 1fr; gap: 28px; align-items: flex-start; }
@media (max-width: 1024px) { .admin-grid { grid-template-columns: 1fr; } }

/* Admin Navigation */
.admin-nav {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-xl);
  padding: 16px;
  position: sticky;
  top: calc(var(--nav-h) + 24px);
  max-height: calc(100vh - var(--nav-h) - 48px);
  overflow-y: auto;
}

.al-link {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  border-radius: var(--r);
  cursor: pointer;
  transition: all 0.2s var(--spring);
  margin-bottom: 4px;
  font-weight: 500;
  color: var(--ink-3);
}

.al-link:hover {
  background: var(--bg-2);
  color: var(--ink);
}

.al-link.on {
  background: var(--accent-bg);
  color: var(--accent);
  font-weight: 600;
}

.al-icon { font-size: 1.2rem; }
.al-label { font-size: 0.9rem; }

/* Stats Grid */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 16px;
  margin-bottom: 32px;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  transition: all 0.2s var(--spring);
}

.stat-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow);
  border-color: var(--accent);
}

.stat-icon {
  width: 48px;
  height: 48px;
  border-radius: var(--r);
  background: var(--accent-bg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.5rem;
}

.stat-value {
  font-size: 1.5rem;
  font-weight: 800;
  color: var(--ink);
  line-height: 1;
}
.stat-label {
  font-size: 0.8rem;
  color: var(--ink-4);
  margin-top: 4px;
}

/* Quick Actions */
.quick-actions { margin-bottom: 32px; }
.quick-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px;
}

.quick-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 20px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s var(--spring);
  border: none;
  font-family: inherit;
}

.quick-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-lg);
  background: var(--accent-bg);
}

/* Content Type Grid */
.content-type-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 32px;
}

.content-type-card {
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: var(--r-lg);
  padding: 24px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s var(--spring);
}

.content-type-card:hover {
  transform: translateY(-4px);
  border-color: var(--accent);
  box-shadow: var(--shadow-accent);
}

/* Forms */
.form-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 28px;
  animation: fadeInUp 0.3s var(--spring);
}

.form-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
  margin-bottom: 24px;
}

.form-group { display: flex; flex-direction: column; }
.form-group.full-width { grid-column: 1 / -1; }

.form-actions {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

/* Content Tables */
.content-table-wrapper {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  overflow: hidden;
}

.content-table {
  width: 100%;
  border-collapse: collapse;
}

.content-table th {
  text-align: left;
  padding: 14px 16px;
  background: var(--bg-2);
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--ink-4);
}

.content-table td {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 0.9rem;
}

.item-info {
  display: flex;
  align-items: center;
  gap: 10px;
}

.action-btns {
  display: flex;
  gap: 8px;
}

.btn-icon {
  width: 32px;
  height: 32px;
  border-radius: var(--r);
  border: none;
  background: var(--bg-2);
  cursor: pointer;
  font-size: 0.9rem;
  transition: all 0.2s;
}

.btn-icon:hover {
  background: var(--accent-bg);
  transform: scale(1.1);
}

/* Empty State */
.empty-state {
  padding: 48px;
  text-align: center;
  color: var(--ink-4);
}

/* Notes Grid */
.notes-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
}

.note-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 20px;
  transition: all 0.2s;
}

.note-card:hover {
  box-shadow: var(--shadow);
  transform: translateY(-2px);
}

/* Quiz Stats */
.quiz-stats {
  display: flex;
  gap: 12px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}

.stat-pill {
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 0.8rem;
  font-weight: 600;
  background: var(--bg-2);
}

.stat-pill.easy { background: #DCFCE7; color: #166534; }
.stat-pill.medium { background: #FEF3C7; color: #92400E; }
.stat-pill.hard { background: #FEE2E2; color: #991B1B; }

.quiz-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 20px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 16px;
}

.difficulty-badge {
  display: inline-block;
  padding: 4px 10px;
  border-radius: 12px;
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.difficulty-badge.easy { background: #DCFCE7; color: #166534; }
.difficulty-badge.medium { background: #FEF3C7; color: #92400E; }
.difficulty-badge.hard { background: #FEE2E2; color: #991B1B; }

/* PYQ Timeline */
.pyq-timeline {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.pyq-item {
  display: flex;
  gap: 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 20px;
}

.pyq-year {
  font-size: 1.25rem;
  font-weight: 800;
  color: var(--accent);
  min-width: 60px;
}

/* Papers List */
.papers-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.paper-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 20px;
  display: flex;
  align-items: center;
  gap: 16px;
}

.paper-icon { font-size: 2rem; }

.paper-info { flex: 1; }

.paper-meta {
  display: flex;
  gap: 12px;
  font-size: 0.8rem;
  color: var(--ink-4);
}

.paper-type {
  background: var(--accent-bg);
  color: var(--accent);
  padding: 2px 8px;
  border-radius: 12px;
  font-weight: 600;
}

/* Teachers Grid */
.teachers-grid-admin {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}

.teacher-card-admin {
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 4px solid;
  border-radius: var(--r-lg);
  padding: 20px;
  display: flex;
  align-items: center;
  gap: 16px;
}

.teacher-avatar-admin {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-weight: 700;
  font-size: 1.1rem;
}

/* Settings */
.settings-grid {
  display: grid;
  gap: 20px;
}

.setting-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 24px;
}

.setting-actions {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

/* Mobile Optimizations */
@media (max-width: 768px) {
  .admin-grid { 
    grid-template-columns: 1fr; 
    gap: 20px;
  }
  
  .admin-nav {
    position: fixed;
    top: 56px;
    left: -280px;
    width: 280px;
    height: calc(100vh - 56px);
    z-index: 900;
    transition: left 0.3s var(--spring);
    border-radius: 0;
    border-left: none;
    border-top: none;
    border-bottom: none;
  }
  
  .admin-nav.open {
    left: 0;
    box-shadow: 2px 0 8px rgba(0, 0, 0, 0.1);
  }
  
  .admin-content {
    margin-left: 0;
  }
  
  /* Admin Header */
  .admin-header {
    flex-direction: column;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 20px;
  }
  
  .admin-header h1 {
    font-size: 1.25rem;
  }
  
  .admin-header .subtitle {
    font-size: 0.85rem;
  }
  
  /* Mobile Menu Toggle */
  .admin-menu-toggle {
    display: flex;
    width: 40px;
    height: 40px;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    cursor: pointer;
    margin-bottom: 16px;
  }
  
  .admin-menu-toggle:active {
    transform: scale(0.95);
  }
  
  /* Stats Grid */
  .stats-grid { 
    grid-template-columns: repeat(2, 1fr); 
    gap: 12px;
    margin-bottom: 24px;
  }
  
  .stat-card { 
    padding: 16px; 
  }
  
  .stat-icon { 
    width: 36px; 
    height: 36px; 
    font-size: 1.1rem;
  }
  
  .stat-value { 
    font-size: 1.1rem; 
  }
  
  .stat-label {
    font-size: 0.75rem;
  }
  
  /* Quick Actions */
  .quick-grid { 
    grid-template-columns: repeat(2, 1fr); 
    gap: 10px;
    margin-bottom: 24px;
  }
  
  .quick-card { 
    padding: 16px; 
  }
  
  .quick-icon { 
    font-size: 1.3rem; 
  }
  
  .quick-label {
    font-size: 0.8rem;
  }
  
  /* Content Type Grid */
  .content-type-grid { 
    grid-template-columns: 1fr; 
    gap: 12px;
    margin-bottom: 24px;
  }
  
  .content-type-card { 
    padding: 20px; 
  }
  
  .type-icon { 
    font-size: 2rem; 
  }
  
  .content-type-card h3 { 
    font-size: 0.95rem; 
  }
  
  .content-type-card p { 
    font-size: 0.75rem; 
  }
  
  /* Forms */
  .form-card { 
    padding: 20px; 
    margin-bottom: 16px;
  }
  
  .form-card h3 {
    font-size: 1rem;
    margin-bottom: 20px;
  }
  
  .form-grid { 
    grid-template-columns: 1fr; 
    gap: 16px;
  }
  
  .form-group label {
    font-size: 0.75rem;
  }
  
  .form-group .fc {
    padding: 12px;
    font-size: 16px; /* Prevents zoom on iOS */
    min-height: 44px;
  }
  
  .form-help {
    font-size: 0.7rem;
  }
  
  .form-actions {
    flex-direction: column;
    gap: 8px;
  }
  
  .form-actions .btn {
    width: 100%;
    justify-content: center;
  }
  
  /* Content Tables */
  .content-table-wrapper {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  
  .content-table {
    min-width: 600px;
    font-size: 0.8rem;
  }
  
  .content-table th,
  .content-table td {
    padding: 8px 6px;
  }
  
  .item-info {
    flex-direction: column;
    align-items: flex-start;
    gap: 4px;
    min-width: 120px;
  }
  
  .action-btns {
    flex-direction: column;
    gap: 4px;
  }
  
  .btn-icon {
    width: 32px;
    height: 32px;
    font-size: 0.85rem;
  }
  
  /* Notes Grid */
  .notes-grid {
    grid-template-columns: 1fr;
    gap: 12px;
  }
  
  .note-card {
    padding: 16px;
  }
  
  .note-header {
    font-size: 0.7rem;
  }
  
  .note-card h4 {
    font-size: 0.95rem;
  }
  
  .note-preview {
    font-size: 0.8rem;
  }
  
  /* Quiz Items */
  .quiz-item {
    flex-direction: column;
    gap: 12px;
    padding: 16px;
  }
  
  .quiz-stats {
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 16px;
  }
  
  .stat-pill {
    padding: 4px 10px;
    font-size: 0.7rem;
  }
  
  .difficulty-badge {
    font-size: 0.65rem;
    padding: 3px 8px;
  }
  
  .quiz-question {
    font-size: 0.9rem;
  }
  
  .quiz-meta {
    font-size: 0.75rem;
  }
  
  /* PYQ Timeline */
  .pyq-timeline {
    gap: 12px;
  }
  
  .pyq-item {
    flex-direction: column;
    gap: 12px;
    padding: 16px;
  }
  
  .pyq-year {
    font-size: 1rem;
    min-width: auto;
  }
  
  .pyq-subject {
    font-size: 0.75rem;
  }
  
  .pyq-question {
    font-size: 0.85rem;
  }
  
  /* Papers List */
  .papers-list {
    gap: 10px;
  }
  
  .paper-card {
    flex-direction: column;
    text-align: center;
    gap: 12px;
    padding: 16px;
  }
  
  .paper-icon {
    font-size: 1.5rem;
  }
  
  .paper-info h4 {
    font-size: 0.95rem;
  }
  
  .paper-meta {
    flex-direction: column;
    gap: 4px;
    font-size: 0.75rem;
  }
  
  .paper-type {
    font-size: 0.7rem;
  }
  
  .paper-actions {
    flex-direction: row;
    gap: 8px;
  }
  
  /* Teachers Grid */
  .teachers-grid-admin {
    grid-template-columns: 1fr;
    gap: 12px;
  }
  
  .teacher-card-admin {
    padding: 16px;
  }
  
  .teacher-avatar-admin {
    width: 44px;
    height: 44px;
    font-size: 1rem;
  }
  
  .teacher-info-admin h4 {
    font-size: 0.95rem;
  }
  
  .teacher-info-admin p {
    font-size: 0.75rem;
  }
  
  /* Settings */
  .settings-grid {
    gap: 16px;
  }
  
  .setting-card {
    padding: 20px;
  }
  
  .setting-card h3 {
    font-size: 0.95rem;
  }
  
  .setting-actions {
    flex-direction: column;
    gap: 8px;
  }
  
  .setting-actions .btn {
    width: 100%;
    justify-content: center;
  }
  
  /* Filter Bar */
  .filter-bar {
    flex-direction: column;
    gap: 8px;
    margin-bottom: 16px;
  }
  
  .search-input,
  .filter-select {
    min-width: 100%;
  }
  
  /* Admin Navigation Links */
  .al-link {
    padding: 14px 12px;
    font-size: 0.85rem;
    min-height: 48px;
  }
  
  .al-icon {
    font-size: 1rem;
  }
  
  /* Empty State */
  .empty-state {
    padding: 32px 16px;
    font-size: 0.9rem;
  }
  
  /* Buttons */
  .btn {
    padding: 12px 16px;
    font-size: 0.9rem;
    min-height: 44px;
  }
  
  .btn-sm {
    padding: 10px 14px;
    font-size: 0.85rem;
    min-height: 36px;
  }
  
  /* Page Header */
  .page-head {
    padding-bottom: 12px !important;
  }
  
  .page-head .subtitle {
    font-size: 0.85rem;
  }
}

/* Small Mobile (320px - 480px) */
@media (max-width: 480px) {
  .admin-nav {
    width: 260px;
    left: -260px;
  }
  
  .stats-grid { 
    grid-template-columns: 1fr; 
    gap: 10px;
  }
  
  .quick-grid { 
    grid-template-columns: 1fr; 
  }
  
  .quick-card { 
    padding: 16px; 
  }
  
  .form-card { 
    padding: 16px; 
  }
  
  .content-type-card { 
    padding: 16px; 
  }
  
  .type-icon { 
    font-size: 1.8rem; 
  }
  
  .content-type-card h3 { 
    font-size: 0.9rem; 
  }
  
  .content-type-card p { 
    font-size: 0.7rem; 
  }
  
  .btn {
    padding: 14px 16px;
    font-size: 0.85rem;
  }
  
  .stat-card {
    padding: 14px;
  }
  
  .stat-icon {
    width: 32px;
    height: 32px;
    font-size: 1rem;
  }
  
  .stat-value {
    font-size: 1rem;
  }
  
  .quick-icon {
    font-size: 1.2rem;
  }
  
  .quick-label {
    font-size: 0.75rem;
  }
}

/* Mobile Menu Toggle Button - Hidden by default, shown on mobile */
.admin-menu-toggle {
  display: none;
}

@media (max-width: 768px) {
  .admin-menu-toggle {
    display: flex;
    width: 40px;
    height: 40px;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    cursor: pointer;
    margin-bottom: 16px;
    font-size: 1.2rem;
  }
  
  .admin-menu-toggle:active {
    transform: scale(0.95);
  }
}

/* Touch Optimizations for Admin */
@media (hover: none) and (pointer: coarse) {
  .stat-card:active,
  .quick-card:active,
  .content-type-card:active,
  .al-link:active,
  .btn-icon:active {
    transform: scale(0.98);
    transition: transform 0.1s;
  }
}

/* Landscape Mobile Admin */
@media (max-width: 768px) and (orientation: landscape) {
  .stats-grid {
    grid-template-columns: repeat(4, 1fr);
  }
  
  .quick-grid {
    grid-template-columns: repeat(4, 1fr);
  }
  
  .content-type-grid {
    grid-template-columns: repeat(2, 1fr);
  }
  
  .admin-nav {
    height: calc(100vh - 48px);
  }
}
</style>
</head>
<body class="admin-page">
<div id="nb"></div>

<!-- LOGIN WALL -->
<div class="login-wall" id="loginWall">
  <div class="premium-card" style="width:100%; max-width:420px; padding:48px; text-align:center; position:relative; overflow:hidden">
    <div class="nav-gem" style="margin:0 auto 24px; width:72px; height:72px; font-size:32px; background:var(--grad-primary)">C</div>
    <h1 style="font-size:1.75rem; margin-bottom:8px">Teacher Admin Portal</h1>
    <p style="color:var(--ink-4); font-size:0.95rem; margin-bottom:32px">Manage lessons, videos, notes, and question papers</p>
    <div class="fg" style="text-align:left">
      <label>Access Key</label>
      <input type="password" class="fc" id="adminPass" placeholder="Enter access key" onkeydown="if(event.key==='Enter')Admin.tryLogin()">
    </div>
    <div id="loginErr" style="color:#EF4444; font-size:0.85rem; margin-bottom:16px; font-weight:600"></div>
    <button class="btn btn-primary" style="width:100%" onclick="Admin.tryLogin()">🔐 Access Dashboard</button>
    <div id="lockTimer" style="margin-top:16px; font-size:0.8rem; color:var(--ink-4)"></div>
  </div>
</div>

<!-- ADMIN BODY -->
<div class="page-layout" id="adminBody" style="display:none">
  <div id="sb"></div>
  <main class="main-area">

    <div class="page-head au" style="padding-bottom: 16px;">
      <div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:16px">
        <div>
          <h1 style="margin:0; font-size:1.5rem;">📚 Teacher Dashboard</h1>
          <p class="subtitle" style="margin-top:4px; font-size:0.9rem;">Manage all educational content easily</p>
        </div>
        <div style="display:flex; gap:10px">
          <button class="btn btn-secondary btn-sm" onclick="Admin.exportData()">📥 Export</button>
          <button class="btn btn-secondary btn-sm" onclick="Admin.logout()">🚪 Logout</button>
        </div>
      </div>
    </div>

    <div class="admin-grid au-2">
      <!-- Mobile Menu Toggle -->
      <button class="admin-menu-toggle" onclick="Admin.toggleMobileNav()">☰</button>
      
      <!-- Sidebar Nav -->
      <nav class="admin-nav" id="adminNav">
        <div id="adminNavLinks"></div>
      </nav>

      <!-- Main Panels -->
      <div class="admin-content" id="adminPanels">
        <!-- Panels will be dynamically generated here -->
      </div>
    </div>
  </main>
</div>

<script src="js/app.js"></script>
<script src="js/security.js"></script>
<script src="js/theme_todo.js"></script>
<script src="js/admin.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  App.initPage('admin');
  Admin.init();
});
</script>
</body>
</html>
