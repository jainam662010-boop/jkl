<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bookmarks — Class 10Edu</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="nb"></div>
<div class="page-layout">
  <div id="sb"></div>
  <main class="main-area" id="mainArea">
    <div style="display:flex;align-items:center;justify-content:center;height:200px"><div class="spinner"></div></div>
  </main>
</div>
<div id="bn"></div>
<div class="page-watermark"></div>
<script src="js/app.js"></script>
<script src="js/security.js"></script>
<script src="js/theme_todo.js"></script>

<script>
document.addEventListener('DOMContentLoaded', async () => {
  App.initPage('bookmarks');
  const data = await App.loadData();
  const bm   = App.getBookmarks();   // ["sid::cid", …]
  const p    = App.getProgress();

  // Resolve bookmarks to full chapter objects
  const items = [];
  bm.forEach(key => {
    const [sid, cid] = key.split('::');
    const subj = App.getSubject(sid);
    const ch   = App.getChapter(sid, cid);
    if (subj && ch) items.push({ subj, ch, sid, cid });
  });

  document.getElementById('mainArea').innerHTML = `
    <div class="page-head au">
      <div class="breadcrumb"><a href="dashboard.html">Dashboard</a> <span class="sep">/</span> <span>Bookmarks</span></div>
      <div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:20px; margin-top:24px">
        <h1 style="margin:0">Saved Chapters</h1>
        ${items.length ? `<div class="streak-badge au-1">${items.length} Saved</div>` : ''}
      </div>
    </div>

    ${!items.length ? `
    <div class="premium-card au-1" style="padding:80px 24px; text-align:center">
      <div style="font-size:64px; margin-bottom:24px">🔖</div>
      <h2 style="margin-bottom:12px">Your Library is Empty</h2>
      <p style="color:var(--ink-3); margin-bottom:32px">Save chapters to access them quickly from here.</p>
      <a href="dashboard.html" class="btn btn-primary">Browse Subjects →</a>
    </div>` : `
    <div class="subjects-grid">
      ${items.map(({subj,ch,sid,cid}, i) => {
        const done = (p[sid]?.done||[]).includes(cid);
        return `<div class="premium-card au" style="padding:32px; animation-delay:${i*100}ms">
          <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:24px">
            <div class="sc-icon" style="background:${subj.bg||'var(--accent-bg)'}; color:${subj.color||'var(--accent)'}">${subj.icon}</div>
            <button onclick="removeBookmark('${sid}','${cid}',this)" class="btn btn-secondary btn-sm" style="color:#EF4444">Remove</button>
          </div>
          <div style="font-size:1.25rem; font-weight:800; margin-bottom:8px">${VidyaSec.sanitize(ch.title)}</div>
          <div style="font-size:0.85rem; color:var(--ink-4); margin-bottom:24px">${VidyaSec.sanitize(subj.name)}</div>
          <div style="display:flex; gap:12px; margin-bottom:24px">
            <span class="chip chip-b">▶ ${ch.lessons.length} Lessons</span>
            ${done ? '<span class="chip chip-tl">✅ Completed</span>' : ''}
          </div>
          <a href="chapter.html?subject=${sid}&chapter=${cid}" class="btn btn-primary" style="width:100%">
            ${done ? 'Review Chapter →' : 'Resume Learning →'}
          </a>
        </div>`;
      }).join('')}
    </div>`}
  `;
});

function removeBookmark(sid, cid, btn) {
  App.toggleBookmark(sid, cid);
  // Remove the card with animation
  const card = btn.closest('.gcard');
  if (card) {
    card.style.transition = 'opacity .3s, transform .3s';
    card.style.opacity = '0';
    card.style.transform = 'scale(0.9)';
    setTimeout(() => { card.remove(); App.toast('Bookmark removed'); }, 300);
  }
}
</script>
</body>
</html>
